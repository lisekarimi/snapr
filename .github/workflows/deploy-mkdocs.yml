name: Deploy MkDocs

on:
  workflow_dispatch:
    inputs:
      confirm_deployment:
        description: 'Type "deploy" to confirm deployment'
        required: true
        default: ''

jobs:
  deploy_mkdocs:
    if: inputs.confirm_deployment == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache MkDocs dependencies
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ github.run_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install MkDocs and dependencies
        run: |
          uv pip install --system mkdocs-material python-dotenv mkdocs-macros-plugin mkdocs-glightbox

      - name: Build MkDocs
        run: mkdocs build --site-dir _site

      - name: Prepare deploy folder
        run: |
          mkdir -p _deploy/docs
          cp -r _site/. _deploy/docs/
          cp landing/index.html _deploy/index.html
          cp landing/CNAME _deploy/CNAME

      - name: Deploy to GitHub Pages
        run: |
          cd _deploy
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy: landing page + docs"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages:gh-pages

      - name: Summary
        run: |
          echo "✅ Successfully deployed"
          echo "🏠 Landing page: https://snapr.lisekarimi.com/"
          echo "📖 Docs: https://snapr.lisekarimi.com/docs/"
